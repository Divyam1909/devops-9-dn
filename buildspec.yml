version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies none
  build:
    commands:
      - echo Build started
  post_build:
    commands:
      - echo Build completed
      - cp devops-9-codebuild/index.html ./index.html 
      - cp -r devops-9-codebuild/* ./                 

artifacts:
  files:
    - 'index.html' 
  discard-paths: yes
